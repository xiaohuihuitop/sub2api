name: Manual Docker Image Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'build-*'

permissions:
  contents: write
  actions: read

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug frontend build inputs
        shell: bash
        run: |
          echo "=== Dockerfile (head) ==="
          sed -n '1,40p' Dockerfile
          echo
          echo "=== frontend/package.json (head) ==="
          sed -n '1,20p' frontend/package.json
          echo
          echo "=== frontend/.npmrc ==="
          cat frontend/.npmrc

      - name: Build Docker image tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: sub2api:latest
          outputs: type=docker,dest=/tmp/sub2api_latest.tar
          no-cache: true

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api_latest
          path: /tmp/sub2api_latest.tar
          if-no-files-found: error
          retention-days: 7

      - name: Publish tar to GitHub Release
        if: startsWith(github.ref, 'refs/tags/build-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: /tmp/sub2api_latest.tar

      - name: Output usage
        shell: bash
        run: |
          echo "Artifact ready: sub2api_latest.tar"
          echo "After download, import with:"
          echo "docker load -i sub2api_latest.tar"
