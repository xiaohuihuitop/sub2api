name: Manual Docker Image Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: sub2api:latest
          outputs: type=docker,dest=/tmp/sub2api_latest.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api_latest
          path: /tmp/sub2api_latest.tar
          if-no-files-found: error
          retention-days: 7

      - name: Output usage
        shell: bash
        run: |
          echo "Artifact ready: sub2api_latest.tar"
          echo "After download, import with:"
          echo "docker load -i sub2api_latest.tar"
