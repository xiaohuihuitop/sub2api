name: Manual Docker Image Build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签，例如 latest、home-v1、2026-05-03'
        required: true
        default: 'latest'
        type: string
      push_latest:
        description: '是否额外推送 latest 标签'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  docker-image:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sub2api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event.inputs.image_tag }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output image references
        shell: bash
        run: |
          echo "Pushed images:"
          echo "${{ steps.meta.outputs.tags }}"
